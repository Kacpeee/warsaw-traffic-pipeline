version: 2

models:
  - name: stg_positions
    description: "Cleaned ZTM vehicle positions - typed, invalid coordinates filtered out."
    columns:
      - name: vehicle_number
        description: "Vehicle side number - identifies a physical vehicle."
        tests: [not_null]
      - name: lat
        description: "Latitude (WGS84)."
        tests: [not_null]
      - name: lon
        description: "Longitude (WGS84)."
        tests: [not_null]

  - name: stg_gtfs_stops
    description: "GTFS stops dimension - stop locations and names."
    columns:
      - name: stop_id
        description: "GTFS stop identifier."
        tests: [not_null]
      - name: stop_lat
        tests: [not_null]

  - name: stg_gtfs_routes
    description: "GTFS routes dimension. line is the public line number."
    columns:
      - name: route_id
        tests: [not_null, unique]
      - name: line
        description: "Public line number, e.g. '523' or 'N01'."
        tests: [not_null]

  - name: stg_gtfs_trips
    description: "GTFS trips. brigade is the join key to live GPS data."
    columns:
      - name: trip_id
        tests: [not_null, unique]

  - name: stg_gtfs_stop_times
    description: "Scheduled arrivals per trip and stop, limited to collected service dates."
    columns:
      - name: trip_id
        tests: [not_null]
      - name: scheduled_arrival
        description: "Scheduled arrival timestamp, handles GTFS times past 24h."
        tests: [not_null]

  - name: int_vehicle_moves
    description: "Vehicle movements: distance, time and speed between consecutive positions."
    columns:
      - name: speed_kmh
        description: "Speed in km/h between two consecutive positions."
        tests: [not_null]

  - name: int_vehicle_delays
    description: "Live positions matched to scheduled stops; delay = actual minus scheduled."
    columns:
      - name: delay_seconds
        description: "Positive = late, negative = early."
        tests: [not_null]
      - name: meters_to_stop
        description: "Distance to the matched stop, at most 100 m."
        tests: [not_null]

  - name: mart_line_speed
    description: "Average speed per line - analytical output."
    columns:
      - name: line
        tests: [not_null, unique]
      - name: avg_speed_kmh
        tests: [not_null]

  - name: mart_line_punctuality
    description: "Punctuality per line: average delay, share of on-time / late / early."
    columns:
      - name: line
        tests: [not_null, unique]
      - name: avg_delay_min
        tests: [not_null]
