version: 2

models:
  - name: stg_positions
    description: "Cleaned ZTM vehicle positions - typed, with invalid coordinates filtered out."
    columns:
      - name: vehicle_number
        description: "Vehicle side number (unique identifier of a physical vehicle)."
        tests:
          - not_null
      - name: lat
        description: "Latitude (WGS84)."
        tests:
          - not_null
      - name: lon
        description: "Longitude (WGS84)."
        tests:
          - not_null

  - name: int_vehicle_moves
    description: "Vehicle movements: distance, time and speed between consecutive positions."
    columns:
      - name: speed_kmh
        description: "Speed in km/h between two consecutive positions of the same vehicle."
        tests:
          - not_null

  - name: mart_line_speed
    description: "Average speed per line - final analytical output."
    columns:
      - name: line
        description: "Line number/identifier."
        tests:
          - not_null
          - unique
      - name: avg_speed_kmh
        description: "Average speed of the line in km/h."
        tests:
          - not_null
