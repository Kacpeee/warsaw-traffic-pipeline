name: dbt CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate dbt project
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dbt
        run: pip install dbt-duckdb

      - name: Install dbt packages
        working-directory: warsaw_dbt
        run: dbt deps

      - name: Parse project
        working-directory: warsaw_dbt
        run: dbt parse --profiles-dir .

      - name: Compile models
        working-directory: warsaw_dbt
        run: dbt compile --profiles-dir . --no-partial-parse
