name: Python CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint and syntax check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install tools
        run: pip install ruff

      - name: Lint
        run: ruff check . --select E9,F63,F7,F82 --output-format=github

      - name: Check formatting
        run: ruff format --check . || true
